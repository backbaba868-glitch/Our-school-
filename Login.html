<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Shree Ganesh Secondary School</title>
    <style>
       .login-box {
    background: #1565c0; /* नीलो ब्याकग्राउन्ड */
    padding: 40px;
    border-radius: 10px;
    width: 300px;
    margin: 50px auto;
    text-align: center;
    color: white;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    background: #fdd835; /* पहेँलो बटन */
    color: black;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}
        

        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .school-logo {
            width: 80px;
            margin-bottom: 15px;
        }
        h2 {
            color: #1565c0;
            margin-bottom: 25px;
            border-bottom: 3px solid #fdd835;
            display: inline-block;
            padding-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }
        .login-btn:hover {
            background-color: #1b5e20;
        }
        .back-home {
            margin-top: 20px;
            display: block;
            text-decoration: none;
            color: #1565c0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Student Login</h2>
        <form>
            <input type="text" placeholder="Enter Username" required>
            <input type="password" placeholder="Enter Password" required>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

</body>
</html>
