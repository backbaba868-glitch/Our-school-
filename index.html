<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Ganesh Secondary School</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#f0f2f5;
}

/* HEADER */
header{
    background:#0d47a1;
    color:white;
    padding:15px;
    text-align:center;
}

.logo{
    width:70px;
    border-radius:50%;
}

/* HERO */
.hero {
    background:url('https://i.imgur.com/1lCqOqk.jpeg') center/cover;
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

/* SECTION */
section {
    padding:20px;
    margin:15px;
    background:white;
    border-radius:10px;
}

/* TEACHERS */
.teacher-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}
.teacher-card{
    background:#fff;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.teacher-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* NAV */
nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#0d47a1;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
nav a{
    color:white;
    text-decoration:none;
}

/* BUTTON */
button{
    padding:10px;
    background:#0d47a1;
    color:white;
    border:none;
    border-radius:5px;
    margin:5px;
}

/* CHAT */
#chatBox{
    position:fixed;
    bottom:80px;
    right:10px;
    width:250px;
    background:white;
    display:none;
    border-radius:10px;
}

#messages{
    height:150px;
    overflow:auto;
    padding:10px;
}

/* TOP BTN */
#topBtn{
    position:fixed;
    bottom:130px;
    right:10px;
    display:none;
}

/* DARK MODE */
.dark{
    background:#121212;
    color:white;
}
.dark section{
    background:#1e1e1e;
}
</style>
</head>

<body>

<header>
    <img src="https://i.imgur.com/rAzwgpe.jpeg" class="logo">
    <h2>Shree Ganesh Secondary School</h2>
</header>

<div class="hero">
    <h1>Welcome to Our School</h1>
    <button onclick="speak('Welcome to Shree Ganesh Secondary School')">🔊 Hear</button>
</div>

<div id="clock"></div>
<div id="screenTime"></div>

<!-- SEARCH -->
<div style="text-align:center; padding:10px;">
    <input id="search" placeholder="Search..." style="padding:10px;width:70%;">
    <button onclick="startVoice()">🎤</button>
</div>

<!-- ABOUT -->
<section>
<h2>About School</h2>
<p>Shree Ganesh Secondary School is a leading educational institution in Nuwakot.</p>
</section>

<!-- TEACHERS -->
<section>
<h2>Teachers</h2>
<div class="teacher-grid">
<div class="teacher-card">
<img src="https://i.imgur.com/MHBF7pF.jpeg">
<h3>Keshar Adhikari</h3>
</div>
<div class="teacher-card">
<img src="https://i.imgur.com/7XQKRUN.jpeg">
<h3>Ram Kumar Giri</h3>
</div>
</div>
</section>

<!-- ADMISSION -->
<section>
<h2>Admission Form</h2>
<form onsubmit="saveAdmission(event)">
<input id="name" placeholder="Student Name" required>
<input id="class" placeholder="Class" required>
<button>Submit</button>
</form>
<div id="admissions"></div>
</section>

<!-- CHAT -->
<div id="chatBox">
<div id="messages"></div>
<input id="msg">
<button onclick="sendChat()">Send</button>
</div>

<button onclick="toggleChat()">💬</button>
<button onclick="darkMode()">🌙</button>
<button onclick="topFunc()" id="topBtn">⬆️</button>

<!-- NAV -->
<nav>
<a href="#">Home</a>
<a href="#">Teachers</a>
<a href="#">Contact</a>
</nav>

<script>

// CLOCK
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleString();
},1000);

// SCREEN TIME
let seconds=0;
setInterval(()=>{
seconds++;
document.getElementById("screenTime").innerText=
"Screen Time: "+seconds+" sec";
},1000);

// SEARCH
document.getElementById("search").onkeyup=function(){
let v=this.value.toLowerCase();
document.querySelectorAll("section").forEach(s=>{
s.style.display=s.innerText.toLowerCase().includes(v)?"block":"none";
});
};

// ADMISSION SAVE
function saveAdmission(e){
e.preventDefault();
let n=document.getElementById("name").value;
let c=document.getElementById("class").value;

let data=JSON.parse(localStorage.getItem("admissions")||"[]");
data.push({name:n,class:c});
localStorage.setItem("admissions",JSON.stringify(data));

loadAdmissions();
alert("Admission Saved!");
}

function loadAdmissions(){
let data=JSON.parse(localStorage.getItem("admissions")||"[]");
document.getElementById("admissions").innerHTML=
data.map(d=>`<p>${d.name} - ${d.class}</p>`).join("");
}
loadAdmissions();

// CHAT
function toggleChat(){
let c=document.getElementById("chatBox");
c.style.display=c.style.display==="block"?"none":"block";
}

function sendChat(){
let m=document.getElementById("msg").value;
let d=document.createElement("div");
d.innerText="You: "+m;
document.getElementById("messages").appendChild(d);
}

// DARK MODE
function darkMode(){
document.body.classList.toggle("dark");
}

// TOP
window.onscroll=function(){
document.getElementById("topBtn").style.display=
document.documentElement.scrollTop>200?"block":"none";
};
function topFunc(){
window.scrollTo({top:0,behavior:"smooth"});
}

// CLOCK SPEAK
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(msg);
}

// VOICE SEARCH
function startVoice(){
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="en-US";
rec.start();
rec.onresult=function(e){
document.getElementById("search").value=e.results[0][0].transcript;
};
}
</script>

</body>
</html>
