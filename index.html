<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shree Ganesh Secondary School</title>

<style>

/* GENERAL */
body {
    margin:0;
    font-family: Arial;
    background:#f0f2f5;
}

/* NAVBAR (APP STYLE) */
nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#0d47a1;
    display:flex;
    justify-content:space-around;
    padding:10px;
    z-index:1000;
}
nav a {
    color:white;
    text-decoration:none;
    font-size:14px;
}

/* HERO */
.hero {
    background:url('https://i.imgur.com/1lCqOqk.jpeg') center/cover;
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

/* SECTION */
section {
    padding:30px;
    background:white;
    margin:15px;
    border-radius:10px;
}

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}
.gallery img {
    width:100%;
    height:120px;
    object-fit:cover;
}

/* BUTTON */
button {
    padding:10px;
    border:none;
    background:#0d47a1;
    color:white;
    border-radius:5px;
}

/* DARK MODE */
.dark {
    background:#121212;
    color:white;
}
.dark section {
    background:#1e1e1e;
}

/* CHAT */
#chatBox {
    position:fixed;
    right:10px;
    bottom:70px;
    width:250px;
    background:white;
    border-radius:10px;
    display:none;
}
#messages {
    height:150px;
    overflow:auto;
    padding:10px;
}

/* TOP BUTTON */
#topBtn {
    position:fixed;
    right:10px;
    bottom:120px;
    display:none;
}

/* CLOCK */
#clock {
    text-align:center;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="hero">
    <h1>Shree Ganesh Secondary School</h1>
</div>

<div id="clock"></div>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search..." style="width:90%;margin:10px;">

<!-- ABOUT -->
<section>
<h2>About</h2>
<p>Best school in Nuwakot providing quality education.</p>
</section>

<!-- GALLERY -->
<section>
<h2>Gallery</h2>

<!-- ADMIN UPLOAD -->
<input type="file" id="upload" accept="image/*">

<div class="gallery" id="gallery"></div>
</section>

<!-- CHAT -->
<div id="chatBox">
    <div id="messages"></div>
    <input id="msg" placeholder="Type...">
    <button onclick="sendMsg()">Send</button>
</div>

<button onclick="toggleChat()">💬</button>

<!-- BUTTONS -->
<button onclick="topFunc()" id="topBtn">⬆️</button>
<button onclick="darkMode()">🌙</button>

<!-- NAV -->
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>

<script>

// 🔍 SEARCH
document.getElementById("search").onkeyup = function(){
    let v = this.value.toLowerCase();
    document.querySelectorAll("section").forEach(s=>{
        s.style.display = s.innerText.toLowerCase().includes(v) ? "block":"none";
    });
};

// 📸 GALLERY UPLOAD (ADMIN DEMO)
document.getElementById("upload").onchange = function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(){
        let img = document.createElement("img");
        img.src = reader.result;
        document.getElementById("gallery").appendChild(img);
    };

    reader.readAsDataURL(file);
};

// 💬 CHAT
function toggleChat(){
    let c = document.getElementById("chatBox");
    c.style.display = c.style.display==="block"?"none":"block";
}

function sendMsg(){
    let msg = document.getElementById("msg").value;
    let div = document.createElement("div");
    div.innerText = "You: " + msg;
    document.getElementById("messages").appendChild(div);
    document.getElementById("msg").value="";
}

// 🌙 DARK MODE
function darkMode(){
    document.body.classList.toggle("dark");
}

// ⬆️ TOP BUTTON
window.onscroll = function(){
    document.getElementById("topBtn").style.display =
    document.documentElement.scrollTop>200?"block":"none";
};

function topFunc(){
    window.scrollTo({top:0,behavior:"smooth"});
}

// 📅 CLOCK
setInterval(()=>{
    document.getElementById("clock").innerText = new Date().toLocaleString();
},1000);

</script>

</body>
</html>
